<title>D365FO Figma Catalog — Smartbox</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb:#0C1428;--sb-hover:#172240;--sb-active:#1E3A6E;--sb-active-txt:#93C5FD;
  --sb-sec:#4A6080;--sb-txt:#CBD5E1;--sb-muted:#64748B;
  --bg:#EEF2F7;--card:#fff;--accent:#2563EB;--accent-lt:#EFF6FF;
  --txt:#0F172A;--muted:#64748B;--border:#E2E8F0;
  --s-green:#16A34A;--s-green-bg:#DCFCE7;
  --s-amber:#D97706;--s-amber-bg:#FEF3C7;
  --s-grey:#94A3B8;--s-grey-bg:#F1F5F9;
  --f:'Segoe UI',system-ui,-apple-system,sans-serif;
  --mono:'Consolas','Courier New',monospace;
}
body{font-family:var(--f);font-size:14px;line-height:1.6;color:var(--txt);background:var(--bg)}
.layout{position:fixed;inset:0;display:flex;overflow:hidden}

/* Sidebar */
.sidebar{width:260px;min-width:260px;background:var(--sb);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #1E2D4A}
.sb-head{padding:18px 16px 12px;border-bottom:1px solid #1E2D4A}
.brand{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
.brand-logo{font-size:12px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#93C5FD}
.brand-sub{font-size:11px;color:var(--sb-muted)}
.search{width:100%;background:#172240;border:1px solid #1E3A6E;border-radius:5px;padding:6px 10px;color:var(--sb-txt);font-family:var(--f);font-size:13px;outline:none}
.search::placeholder{color:var(--sb-muted)}
.search:focus{border-color:var(--accent)}
.nav{flex:1;overflow-y:auto;padding:6px 0 20px}
.nav::-webkit-scrollbar{width:3px}
.nav::-webkit-scrollbar-thumb{background:#1E3A6E;border-radius:2px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;cursor:pointer;user-select:none}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sb-sec)}
.sec-count{font-size:10px;color:var(--sb-muted);background:#172240;padding:1px 6px;border-radius:10px}
.sec-items.hidden{display:none}
.nav-item{display:flex;align-items:center;gap:8px;padding:5px 16px 5px 24px;cursor:pointer;color:var(--sb-txt);font-size:13px;transition:background .1s}
.nav-item:hover{background:var(--sb-hover)}
.nav-item.active{background:var(--sb-active);color:#E0EDFF}
.nav-item-name{flex:1}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.seeded{background:var(--s-green)}
.dot.stub{background:var(--s-amber)}
.dot.todo{background:var(--sb-muted)}

/* Main */
.main{flex:1;overflow-y:auto;padding:28px 32px}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}

/* Home */
.home-ttl{font-size:24px;font-weight:700;margin-bottom:4px}
.home-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.home-sec-lbl{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin:24px 0 10px}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:8px}
.hcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.hcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);border-color:#BFDBFE}
.hcard-name{font-size:13px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hcard-figma{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:7px}
.hcard-purpose{font-size:12px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600;line-height:1.4}
.badge.seeded{background:var(--s-green-bg);color:var(--s-green)}
.badge.stub{background:var(--s-amber-bg);color:var(--s-amber)}
.badge.todo{background:var(--s-grey-bg);color:var(--s-grey)}

/* Item view */
.item-head{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:22px 26px;margin-bottom:14px}
.item-brow{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
.item-name{font-size:22px;font-weight:700;color:var(--txt);text-wrap:balance;margin-bottom:10px}
.item-meta{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:12px}
.meta-grp{display:flex;flex-direction:column;gap:3px}
.meta-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.meta-val{font-family:var(--mono);font-size:12px;color:var(--accent);background:var(--accent-lt);padding:2px 8px;border-radius:4px;display:inline-block}
.item-purpose{font-size:14px;line-height:1.65;color:var(--txt)}

/* Section card */
.sec{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 24px;margin-bottom:10px}
.sec-ttl{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

/* Anatomy */
.anatomy{background:#0C1428;border-radius:6px;padding:14px 16px;font-family:var(--mono);font-size:12px;line-height:1.75;color:#93C5FD;overflow-x:auto;white-space:pre}

/* Rules */
.rules{list-style:none;display:flex;flex-direction:column;gap:7px}
.rules li{display:flex;gap:10px;font-size:13px;line-height:1.5}
.rules li::before{content:'—';color:var(--muted);flex-shrink:0}

/* Do/Don't */
.dd{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.do-blk{background:#F0FDF4;border-left:3px solid var(--s-green);border-radius:6px;padding:13px}
.dn-blk{background:#FEF2F2;border-left:3px solid #EF4444;border-radius:6px;padding:13px}
.dd-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px}
.do-blk .dd-lbl{color:var(--s-green)}
.dn-blk .dd-lbl{color:#DC2626}
.dd-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.dd-list li{font-size:12px;line-height:1.45;display:flex;gap:7px}
.do-blk .dd-list li::before{content:'✓';color:var(--s-green);flex-shrink:0}
.dn-blk .dd-list li::before{content:'✕';color:#DC2626;flex-shrink:0}

/* Props table */
.ptbl{width:100%;border-collapse:collapse;font-size:13px}
.ptbl th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:5px 10px;background:#F8FAFC;border-bottom:1px solid var(--border)}
.ptbl td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.ptbl tr:last-child td{border-bottom:none}
.ptbl tr:hover td{background:#F8FAFC}
.ptbl td:first-child{font-family:var(--mono);font-size:12px;color:var(--accent);white-space:nowrap}

/* Figma chip */
.figma-chip{display:inline-flex;align-items:center;gap:6px;background:#F5F3FF;border:1px solid #DDD6FE;border-radius:6px;padding:5px 11px;font-family:var(--mono);font-size:12px;color:#5B21B6;margin-bottom:8px}
.variants{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.vchip{background:#F8FAFC;border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:11px;color:var(--muted);font-family:var(--mono)}

/* Pending */
.pending{background:var(--card);border:1px dashed var(--border);border-radius:10px;padding:40px;text-align:center;color:var(--muted)}
.pending h3{font-size:15px;color:var(--txt);margin-bottom:8px}
.pending code{font-family:var(--mono);font-size:12px;color:var(--accent);background:var(--accent-lt);padding:2px 6px;border-radius:3px}

/* ─── Wireframe diagrams ─── */
.wf{border:1.5px solid #93C5FD;border-radius:6px;overflow:hidden;background:#EFF6FF;font-family:var(--mono);color:#1D4ED8;margin-bottom:4px;font-size:10px}
.wf-chrome{background:#1E293B;height:22px;display:flex;align-items:center;padding:0 8px;gap:5px;color:#94A3B8;font-size:9px}
.wf-cd{width:6px;height:6px;border-radius:50%;background:#4B5563;flex-shrink:0}
.wf-ap{background:#DBEAFE;border-bottom:1.5px solid #93C5FD;display:flex;gap:3px;padding:3px 6px;align-items:center;flex-wrap:wrap;min-height:26px}
.wf-abt{background:#BFDBFE;border-radius:3px 3px 0 0;padding:3px 8px;font-size:9px;cursor:default}
.wf-abt.on{background:#2563EB;color:#fff}
.wf-btn{background:#fff;border:1px solid #93C5FD;border-radius:3px;padding:2px 7px;font-size:9px;white-space:nowrap;cursor:default}
.wf-body{display:flex;overflow:hidden;min-height:90px}
.wf-left{width:170px;min-width:170px;border-right:1.5px solid #93C5FD}
.wf-center{flex:1;min-width:0}
.wf-fb{width:150px;min-width:150px;border-left:1.5px solid #93C5FD}
.wf-fp{width:145px;min-width:145px;border-right:1.5px solid #93C5FD}
.wf-shd{background:#DBEAFE;border-bottom:1px solid #93C5FD;padding:3px 8px;font-size:9px;font-weight:700}
.wf-g{width:100%;border-collapse:collapse}
.wf-g th{background:#DBEAFE;border-bottom:1.5px solid #93C5FD;padding:2px 5px;text-align:left;font-size:9px;font-weight:700;white-space:nowrap}
.wf-g td{border-bottom:1px solid #BFDBFE;padding:2px 5px;font-size:9px;white-space:nowrap}
.wf-g tr:nth-child(even) td{background:rgba(219,234,254,.25)}
.wf-g td.lk{color:#2563EB;text-decoration:underline}
.wf-ft{border:1px solid #93C5FD;margin:4px 5px;border-radius:3px;overflow:hidden}
.wf-fth{background:#DBEAFE;padding:3px 8px;font-size:9px;font-weight:700;display:flex;align-items:center}
.wf-ftb{padding:5px 7px;display:flex;flex-wrap:wrap;gap:5px}
.wf-f{display:flex;flex-direction:column;gap:2px;min-width:78px}
.wf-fl{font-size:8px;color:#64748B;text-transform:uppercase;letter-spacing:.04em}
.wf-fv{background:#fff;border:1px solid #93C5FD;border-radius:2px;padding:1px 5px;font-size:9px;min-height:15px}
.wf-qf{display:flex;align-items:center;gap:5px;padding:3px 6px;border-bottom:1px solid #BFDBFE}
.wf-qi{flex:1;background:#fff;border:1px solid #93C5FD;border-radius:2px;height:15px}
.wf-rt{background:#fff;border-bottom:1.5px solid #93C5FD;padding:6px 10px}
.wf-rid{font-weight:700;font-size:10px;color:#0F172A}
.wf-wfb{background:#FEF9C3;border-bottom:1.5px solid #FDE68A;padding:3px 8px;display:flex;align-items:center;gap:6px;font-size:9px}
.wf-chip{border-radius:10px;padding:1px 6px;font-size:8px;font-weight:700;display:inline-block}
.wf-chip.g{background:#DCFCE7;color:#16A34A}
.wf-chip.b{background:#DBEAFE;color:#1D4ED8}
.wf-chip.a{background:#FEF3C7;color:#D97706}
.wf-chip.r{background:#FEE2E2;color:#DC2626}
.wf-chip.gr{background:#F1F5F9;color:#64748B}
.wf-dlg{background:#fff;border:1.5px solid #93C5FD;border-radius:5px;margin:10px auto;max-width:280px;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.wf-dlgh{background:#DBEAFE;border-bottom:1.5px solid #93C5FD;padding:5px 10px;font-weight:700;font-size:10px;border-radius:5px 5px 0 0}
.wf-dlgb{padding:8px 10px;display:flex;flex-direction:column;gap:5px}
.wf-dlgf{border-top:1px solid #BFDBFE;padding:5px 10px;display:flex;justify-content:flex-end;gap:5px}
.wf-vtl{width:120px;min-width:120px;border-right:1.5px solid #93C5FD;background:#DBEAFE}
.wf-vti{padding:4px 10px;font-size:9px;cursor:default;border-bottom:1px solid rgba(147,197,253,.3)}
.wf-vti.on{background:#2563EB;color:#fff}
.wf-pano{display:flex;overflow-x:auto}
.wf-psec{min-width:155px;border-right:1.5px solid #93C5FD}
.wf-tile{background:#fff;border:1px solid #93C5FD;border-radius:3px;padding:4px 7px;text-align:center;min-width:52px}
.wf-tv{font-size:12px;font-weight:700;color:#1D4ED8}
.wf-tl{font-size:8px;color:#64748B}
.wf-note{font-size:8px;color:#64748B;padding:3px 8px;border-top:1px solid #BFDBFE;font-style:italic;background:#fff}
.wf-seg{display:inline-flex;border:1px solid #93C5FD;border-radius:3px;overflow:hidden}
.wf-sp{border-right:1px solid #93C5FD;padding:2px 7px;background:#fff;font-size:9px}
.wf-sp:last-child{border-right:none}
.wf-sp.ak{background:#DBEAFE;color:#1D4ED8;font-weight:700}
.wf-ov{background:rgba(15,23,42,.28);padding:10px;min-height:100px;display:flex;align-items:flex-start;justify-content:center}
.wf-drop{background:#fff;border:1.5px solid #93C5FD;border-radius:4px;padding:8px;width:190px;box-shadow:0 3px 10px rgba(0,0,0,.14)}
</style>

<div class="layout">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="brand"><span class="brand-logo">D365FO</span><span class="brand-sub">Figma Catalog</span></div>
      <input class="search" id="search" placeholder="Search…" autocomplete="off">
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <main class="main" id="main"></main>
</div>

<script>
const PATTERNS=[
{id:'list-page',name:'List Page',figma:'Pattern/ListPage',aot:'ListPage',status:'Seeded',
purpose:'A standalone grid of records with no co-located detail panel. Primary navigation entry point for entities with more than one details form or where no 1:1 detail view is needed.',
useWhen:'The entity opens multiple details forms depending on context, or is purely a lookup/filter destination.',
dontUseWhen:'A single Details Master covers the entity — use Details Master instead.',
anatomy:'Design\n├── ActionPane (Standard)\n├── (FilterPane)  [optional]\n├── CustomFilterGroup  [optional]\n│   ├── QuickFilter\n│   └── Dropdown filters\n└── Grid (Style=List or Tabular)',
rules:['QuickFilter always above the grid, left-aligned.','FilterPane on the left when users need multiple simultaneous filter criteria.','First column is the hyperlinked default action — opens the detail form.','Default 6–10 visible columns; let users personalise via column chooser.'],
doList:['Use for entities with more than one details form.','Enable Export to Excel via the system-defined button.'],
dontList:['Don\'t use if a single Details Master covers the entity.','Don\'t hard-code filter values — use SysQuery.'],
figmaVariants:['FilterPane: Yes/No','CustomFilter: Yes/No','Grid style: List/Tabular'],props:[]},

{id:'details-master',name:'Details Master',figma:'Pattern/DetailsMaster',aot:'DetailsFormMaster',status:'Seeded',
purpose:'The canonical pattern for a master entity (Customer, Vendor, Item). Combines a navigation list (left) with a detail panel (right) showing FastTabs for the selected record.',
useWhen:'The entity is a master record — a party, item, or resource — with multiple header attributes.',
dontUseWhen:'The entity is transactional (use Details Transaction). The entity is simple enough for Simple List.',
anatomy:'Design\n├── ActionPane (Standard)\n├── SidePanel (Style=SelectionList)\n│   └── Grid (Style=List)  — navigation list\n└── DetailsPanel\n    ├── HeaderTitle (ID + Description)\n    └── Tab (Style=FastTabs)\n        └── TabPage (1..N)  — FastTabs',
rules:['Navigation list: Grid Style=List, 2–3 columns (ID, Name, Status).','First FastTab expanded; all others collapsed.','Promote 1–3 summary fields per FastTab.','FactBox panel recommended for related info.'],
doList:['Default-expand only the first FastTab.','Add a FactBox for related entity info.'],
dontList:['Don\'t use for transactional records.','Don\'t show more than 8–10 FastTabs.'],
figmaVariants:['FactBox: Yes/No','StandardTabs variant'],props:[]},

{id:'details-transaction',name:'Details Transaction',figma:'Pattern/DetailsTransaction',aot:'DetailsFormTransaction',status:'Seeded',
purpose:'For transactional records with a Header and one or more Line collections (e.g. Sales order). Provides three views: Grid (list), Header (record detail), and Line (line grid + per-line detail tabs).',
useWhen:'The entity has a header record and child line collections that must be edited together.',
dontUseWhen:'The entity has no lines — use Details Master or Simple Details.',
anatomy:'Design\n├── ActionPane (Standard)\n├── Grid view  — tabular list (default landing)\n│   ├── QuickFilter + CustomFilterGroup\n│   └── Grid (Tabular)\n├── Header view  — on record click\n│   ├── SidePanel (nav list)\n│   ├── RecordTitle / HeaderTitle\n│   └── Tab (FastTabs) — header fields\n└── Line view  — LINES toggle\n    ├── LineViewHeader (summary band)\n    ├── Grid (line grid, Tabular)\n    └── Tab (Style=Tabs) — per-line detail',
rules:['Three views (Grid, Header, Line) are all required.','Header/Lines toggle is rendered as a tab strip in the ActionPane area.','Line detail uses Standard Tabs (Style=Tabs), not FastTabs.','Navigation list in Header/Line views: Grid Style=List, ≤3 columns.'],
doList:['Include all three views in the Figma mock.','Show the SidePanel nav list in Header and Line views.'],
dontList:['Don\'t use FastTabs in the line detail area — Standard Tabs only.','Don\'t omit the Grid view — it\'s always the default landing.'],
figmaVariants:['View: GridView/HeaderView/LineView','FactBox: Yes/No'],props:[]},

{id:'simple-details',name:'Simple Details',figma:'Pattern/SimpleDetails',aot:'SimpleDetails',status:'Seeded',
purpose:'A single-record edit form with no navigation list. Used for parameters pages, profile records, and any entity where there is always exactly one record in context.',
useWhen:'The form always works on a single pre-selected record — parameters, user settings, a record opened from a calling form.',
dontUseWhen:'The user needs to navigate between multiple records — use Details Master.',
anatomy:'Design\n├── ActionPane (Standard) or none\n└── Body — one of four variants:\n    A. ToolbarAndFields  — local toolbar + flat fields\n    B. FastTabs          — collapsible FastTab sections\n    C. StandardTabs      — horizontal tab strip\n    D. Panorama          — horizontal scroll sections',
rules:['No navigation list — record is always pre-selected.','FastTabs variant: expand first tab, collapse rest, promote summary fields.','ToolbarAndFields for simple setup records with ≤8 fields.','Don\'t mix FastTabs and Standard Tabs in the same form body.'],
doList:['Use FastTabs variant when record has 10+ fields in logical sections.','Use ToolbarAndFields for simple setup with ≤8 fields.'],
dontList:['Don\'t add a navigation list — if navigation is needed, use a different pattern.','Don\'t mix tab styles in the same body.'],
figmaVariants:['Variant: ToolbarAndFields/FastTabs/StandardTabs/Panorama'],props:[]},

{id:'simple-list',name:'Simple List',figma:'Pattern/SimpleList',aot:'SimpleList',status:'Seeded',
purpose:'An inline-editable list for simple entity maintenance. All fields are edited directly in the grid — no separate detail panel. Best for reference/code tables with ≤6 fields and no child collections.',
useWhen:'Entity has ≤6 fields, no child collections, and the user edits values directly in the grid (Units of measure, Payment terms, Reason codes).',
dontUseWhen:'Entity has >6 fields or child collections — use Simple List and Details.',
anatomy:'Design\n├── ActionPane (Strip) or CommandButtons\n│   └── New / Delete\n├── (QuickFilter)  [optional]\n└── Grid (editable, Style=List or Tabular)',
rules:['All editing happens inline — no separate edit form.','Max ≤6 visible columns by default.','New row added at bottom; first field gains focus.','QuickFilter recommended for lists >20 rows.'],
doList:['Use for reference/code tables with ≤6 fields.','Enable inline row editing.'],
dontList:['Don\'t use if entity has child collections.','Don\'t add a navigation panel or FastTabs.'],
figmaVariants:['Grid style: List/Tabular','QuickFilter: Yes/No'],props:[]},

{id:'simple-list-details',name:'Simple List and Details',figma:'Pattern/SimpleListAndDetails',aot:'SimpleListDetails',status:'Seeded',
purpose:'A split-panel form for medium-complexity entities. List or tree on the left, detail panel on the right. Detail updates synchronously as the user moves through the list.',
useWhen:'Entity has 6+ fields or 1–5 child collections and the user needs to navigate the list while editing details in the same form.',
dontUseWhen:'Entity has many child line collections — use Details Transaction. Simple enough for Simple List.',
anatomy:'Design\n├── ActionPane\n└── Body — one of three variants:\n    A. ListGrid    — list (left) + field group (right)\n    B. TabularGrid — tabular grid (left) + fields (right)\n    C. Tree        — tree (left) + fields (right)',
rules:['List/tree on the left drives selection; right panel responds synchronously.','ListGrid: left list ≤3 columns. TabularGrid: multi-column left.','Tree: for hierarchical parent-child structures.','≤5 FastTabs in the right detail panel.'],
doList:['Use ListGrid or TabularGrid for flat entities, Tree for hierarchies.','Show 2–4 key fields in the left list.'],
dontList:['Don\'t use when child collections have their own children — that\'s Details Transaction.','Don\'t put more than 5 FastTabs in the right panel.'],
figmaVariants:['Variant: ListGrid/TabularGrid/Tree'],props:[]},

{id:'table-of-contents',name:'Table of Contents',figma:'Pattern/TableOfContents',aot:'TableOfContents',status:'Seeded',
purpose:'A parameters or setup form with many loosely-related sections. A vertical tab strip on the left acts as a table of contents; each section is a full-height panel on the right.',
useWhen:'Form is a parameters page or rich setup form with 5+ distinct configuration sections.',
dontUseWhen:'User needs to navigate between multiple records — single record only.',
anatomy:'Design\n├── ActionPane (optional)\n└── Tab (Style=VerticalTabs)\n    └── TabPage (1..N) — one section per page\n        └── Group or FastTabs\n            └── Fields / Grids',
rules:['Vertical tab strip (Style=VerticalTabs) is the defining structural element.','Each TabPage is a logically distinct configuration area.','Sections can contain FastTabs, flat field groups, or grids.','No ActionPane required if form auto-saves (parameters).'],
doList:['Use for parameters pages with 5+ distinct areas.','Group related configuration into coherent TabPage sections.'],
dontList:['Don\'t use for transactional or master entity editing.','Don\'t use for navigating between multiple records.'],
figmaVariants:['ActionPane: Yes/No','Section count: 3–8'],props:[]},

{id:'operational-workspace',name:'Operational Workspace',figma:'Pattern/OperationalWorkspace',aot:'OperationalWorkspace',status:'Seeded',
purpose:'A role-tailored activity hub aggregating KPIs, lists, charts, and quick links for a specific business role. Primary navigation destination for a persona.',
useWhen:'Building a role dashboard that surfaces key metrics, actionable lists, and shortcuts for a specific business function.',
dontUseWhen:'User needs to edit a specific record — workspaces are read and navigate, not edit.',
anatomy:'Design\n├── ActionPane (optional)\n├── WorkspacePageFilter (top filter bar)\n├── PanoramaSection (1..N)\n│   ├── Section: Tiles (KPI)\n│   ├── Section: Chart\n│   ├── Section: Tabbed list\n│   └── Section: Related links\n└── (FactBox optional)',

const SECTIONS=[
  {key:'patterns',label:'Form Patterns',data:PATTERNS},
  {key:'controls',label:'Controls',data:CONTROLS},
  {key:'composites',label:'Composites',data:COMPOSITES},
  {key:'subpatterns',label:'Subpatterns',data:SUBPATTERNS},
];

let currentId=null,collapsed={};

function buildNav(filter){
  const nav=document.getElementById('nav');nav.innerHTML='';
  SECTIONS.forEach(s=>{
    const items=filter?s.data.filter(d=>d.name.toLowerCase().includes(filter)||(d.figma||'').toLowerCase().includes(filter)):s.data;
    if(!items.length)return;
    const isColl=collapsed[s.key];
    const el=document.createElement('div');el.className='nav-sec';
    el.innerHTML=`<div class="sec-hd" data-key="${s.key}"><span class="sec-label">${s.label}</span><span class="sec-count">${items.length}</span></div><div class="sec-items${isColl?' hidden':''}" id="sec-${s.key}">${items.map(item=>`<div class="nav-item${currentId===item.id?' active':''}" data-id="${item.id}" data-sec="${s.key}"><span class="nav-item-name">${item.name}</span><span class="dot ${(item.status||'todo').toLowerCase()}"></span></div>`).join('')}</div>`;
    nav.appendChild(el);
  });
  nav.querySelectorAll('.sec-hd').forEach(h=>h.addEventListener('click',()=>{collapsed[h.dataset.key]=!collapsed[h.dataset.key];buildNav(filter);}));
  nav.querySelectorAll('.nav-item').forEach(it=>it.addEventListener('click',()=>navigate(it.dataset.id,it.dataset.sec)));
}

function secTag(k){return{patterns:'Form Pattern',controls:'Control',composites:'Composite',subpatterns:'Subpattern'}[k]||k}

function renderWireframe(id){
  const chr=`<div class="wf-chrome"><span class="wf-cd"></span><span class="wf-cd"></span><span class="wf-cd"></span><span style="margin-left:6px;opacity:.55">Dynamics 365 Finance</span></div>`;
  const ap=(tabs,btns=[])=>`<div class="wf-ap">${tabs.map((t,i)=>`<span class="wf-abt${i===0?' on':''}">${t}</span>`).join('')}<span style="flex:1"></span>${btns.map(b=>`<span class="wf-btn">${b}</span>`).join('')}</div>`;
  const aps=(btns)=>`<div class="wf-ap" style="background:#F8FAFC;border-bottom:1px solid #BFDBFE">${btns.map(b=>`<span class="wf-btn">${b}</span>`).join('')}</div>`;
  const rt=(id,desc,st,cat='g')=>`<div class="wf-rt"><div class="wf-rid">${id}${desc?` <span style="color:#94A3B8;font-weight:400">:</span> ${desc}`:''}${st?` <span style="color:#94A3B8;font-weight:400"> — </span><span class="wf-chip ${cat}">${st}</span>`:''}</div></div>`;
  const wfbar=(st,cat='b')=>`<div class="wf-wfb"><span class="wf-chip ${cat}">${st}</span><span class="wf-btn" style="margin-left:4px">Submit</span><span class="wf-btn" style="opacity:.38">Approve</span><span class="wf-btn" style="opacity:.38">Reject</span><span style="flex:1"></span><span class="wf-btn">History</span></div>`;
  const qf=()=>`<div class="wf-qf"><div class="wf-qi"></div><span class="wf-btn">Filters ▾</span></div>`;

    case 'combo': return W(`

    case 'boolean-controls': return W(`

    `);

    case 'lookup-control': return W(`
      <div style="padding:7px;display:flex;flex-direction:column;gap:6px">
        <div class="wf-fl" style="margin-bottom:2px">ReferenceGroup (modern FK — shows natural key)</div>
        <div class="wf-ftb" style="flex-wrap:wrap">
          <div class="wf-f" style="min-width:160px">
            <div class="wf-fl">Customer account</div>
            <div style="display:flex">
              <div class="wf-fv" style="flex:1;border-radius:2px 0 0 2px">US-001 — Fabrikam Inc.</div>
              <div class="wf-fv" style="border-left:none;border-radius:0 2px 2px 0;padding:1px 5px">▾</div>
            </div>
          </div>
          <div class="wf-f" style="min-width:140px">

            <div style="display:flex">
              <div class="wf-fv" style="flex:1;border-radius:2px 0 0 2px;border-color:#2563EB;border-width:2px"></div>
              <div class="wf-fv" style="border-left:none;border-radius:0 2px 2px 0;padding:1px 5px;border-color:#2563EB;border-width:2px">▾</div>

    case 'segmented-entry': return W(`
      <div style="padding:7px;display:flex;flex-direction:column;gap:8px">
        <div>
          <div class="wf-fl" style="margin-bottom:4px">Ledger account — LedgerDimensionAccountController (3-segment)</div>
          <div class="wf-seg">
            <div class="wf-sp ak">110100</div>
            <div style="padding:2px 4px;background:#F8FAFC;font-size:9px;color:#94A3B8">–</div>
            <div class="wf-sp">0250</div>
            <div style="padding:2px 4px;background:#F8FAFC;font-size:9px;color:#94A3B8">–</div>
            <div class="wf-sp">CC-WEST</div>
            <div class="wf-sp" style="border-left:1px solid #93C5FD;padding:2px 6px">▾</div>
          </div>
        </div>
        <div>
          <div class="wf-fl" style="margin-bottom:4px">Default dimension — DimensionDefaultingController (4-segment, read-only)</div>
          <div class="wf-seg" style="opacity:.65">
            <div class="wf-sp" style="background:#F8FAFC;color:#64748B">0250</div>

    case 'workflow-controls': return W(`
      ${ap(['Sales order','Sell','Invoice'])}
      ${wfbar('In review','b')}
      ${rt('SO-00001','Fabrikam Inc.','In review','b')}
      <div style="padding:5px">
        <div class="wf-fl" style="margin-bottom:4px">Button visibility by workflow status</div>
        <table class="wf-g">
          <thead><tr><th>Button</th><th>Draft</th><th>In review</th><th>Approved</th><th>Rejected</th></tr></thead>

            <tr><td>History</td><td style="color:#16A34A">✓</td><td style="color:#16A34A">✓</td><td style="color:#16A34A">✓</td><td style="color:#16A34A">✓</td></tr>

    `);

    case 'record-title': return W(`
      <div style="padding:6px;display:flex;flex-direction:column;gap:6px">
        <div><div class="wf-fl" style="margin-bottom:3px">ID : Description — Status</div>
          ${rt('SO-00001','Fabrikam Inc.','Confirmed','g')}
        </div>
        <div><div class="wf-fl" style="margin-bottom:3px">ID only (no description field)</div>
          ${rt('GL-00124','','')}
        </div>
        <div><div class="wf-fl" style="margin-bottom:3px">New unsaved record</div>
          <div class="wf-rt"><div class="wf-rid" style="color:#94A3B8">&lt;New&gt;</div></div>
        </div>
        <div><div class="wf-fl" style="margin-bottom:3px">With secondary attributes (·)</div>
          <div class="wf-rt"><div class="wf-rid">SO-00001 <span style="color:#94A3B8;font-weight:400">:</span> Fabrikam Inc. <span style="color:#94A3B8;font-weight:400">·</span> <span style="font-weight:400;color:#64748B;font-size:9px">B2B · €12,500</span></div></div>
        </div>
      </div>
      ${note('Always read-only. ID separator is " : " (space-colon-space). Status separator is " — " (space-em-dash-space). Never show internal RecId.')}
    `);

    case 'entity-status': return W(`
      <div style="padding:7px;display:flex;flex-direction:column;gap:9px">
        <div>
          <div class="wf-fl" style="margin-bottom:5px">Status badge variants — Fluent 2 semantic tokens</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
            <span class="wf-chip gr">Draft</span>
            <span class="wf-chip gr">Created</span>
            <span class="wf-chip g">Confirmed</span>
            <span class="wf-chip g">Active</span>
            <span class="wf-chip b">In review</span>
            <span class="wf-chip b">Processing</span>
            <span class="wf-chip a">On hold</span>
            <span class="wf-chip a">Partial</span>
            <span class="wf-chip r">Rejected</span>
            <span class="wf-chip r">Cancelled</span>
          </div>
        </div>
        <div>
          <div class="wf-fl" style="margin-bottom:4px">In RecordTitle (title area) context</div>
          ${rt('SO-00001','Fabrikam Inc.','Confirmed','g')}

        <div style="background:#FEF9C3;border:1px solid #FDE68A;border-radius:3px;padding:4px 7px;font-size:9px">
          WorkflowBar chip (yellow bar, "In review") is separate from EntityStatus badge — both can appear simultaneously.

function renderItem(item,sk){
  const st=(item.status||'Todo').toLowerCase();
  const hd=`<div class="item-head"><div class="item-brow"><span>${secTag(sk)}</span><span class="badge ${st}">${item.status}</span></div><div class="item-name">${item.name}</div><div class="item-meta">${item.figma?`<div class="meta-grp"><span class="meta-lbl">Figma</span><span class="meta-val">${item.figma}</span></div>`:''} ${item.aot?`<div class="meta-grp"><span class="meta-lbl">AOT</span><span class="meta-val">${item.aot}</span></div>`:''}</div>${item.purpose?`<div class="item-purpose">${item.purpose}</div>`:''}</div>`;
  if(st==='todo'||st==='stub'){return hd+`<div class="pending"><h3>${st==='stub'?'Stub — full doc pending':'Catalog doc not yet written'}</h3><p>Track progress in <code>catalog/README.md</code></p></div>`;}
  let html=hd;
  const wfHtml=renderWireframe(item.id);
  if(wfHtml){html+=`<div class="sec"><div class="sec-ttl">Visual structure</div>${wfHtml}</div>`;}
  if(item.useWhen||item.dontUseWhen){html+=`<div class="sec"><div class="sec-ttl">When to use</div><ul class="rules">${item.useWhen?`<li><strong>Use when:</strong> ${item.useWhen}</li>`:''}${item.dontUseWhen?`<li><strong>Don't use when:</strong> ${item.dontUseWhen}</li>`:''}</ul></div>`;}
  if(item.anatomy){html+=`<div class="sec"><div class="sec-ttl">Anatomy</div><div class="anatomy">${item.anatomy}</div></div>`;}
  if(item.rules?.length){html+=`<div class="sec"><div class="sec-ttl">Key rules</div><ul class="rules">${item.rules.map(r=>`<li>${r}</li>`).join('')}</ul></div>`;}
  if(item.doList?.length||item.dontList?.length){html+=`<div class="sec"><div class="sec-ttl">Do / Don't</div><div class="dd"><div class="do-blk"><div class="dd-lbl">Do</div><ul class="dd-list">${(item.doList||[]).map(d=>`<li>${d}</li>`).join('')}</ul></div><div class="dn-blk"><div class="dd-lbl">Don't</div><ul class="dd-list">${(item.dontList||[]).map(d=>`<li>${d}</li>`).join('')}</ul></div></div></div>`;}
  if(item.props?.length){html+=`<div class="sec"><div class="sec-ttl">Key AOT properties</div><div style="overflow-x:auto"><table class="ptbl"><thead><tr><th>Property</th><th>Notes</th></tr></thead><tbody>${item.props.map(([p,n])=>`<tr><td>${p}</td><td>${n}</td></tr>`).join('')}</tbody></table></div></div>`;}
  if(item.figmaVariants?.length){html+=`<div class="sec"><div class="sec-ttl">Figma component</div><div class="figma-chip">◆ ${item.figma}</div><div class="variants">${item.figmaVariants.map(v=>`<span class="vchip">${v}</span>`).join('')}</div></div>`;}
  return html;
}

function navigate(id,sk){
  if(!sk){for(const s of SECTIONS){if(s.data.find(d=>d.id===id)){sk=s.key;break;}}}
  const item=SECTIONS.find(s=>s.key===sk)?.data.find(d=>d.id===id);
  if(!item)return;
  currentId=id;
  buildNav(document.getElementById('search').value.toLowerCase().trim()||undefined);
  const main=document.getElementById('main');
  main.innerHTML=renderItem(item,sk);main.scrollTop=0;
}

function showHome(){
  currentId=null;buildNav();
  const main=document.getElementById('main');
  const total=SECTIONS.reduce((n,s)=>n+s.data.length,0);
  const seeded=SECTIONS.reduce((n,s)=>n+s.data.filter(d=>d.status==='Seeded').length,0);
  const stub=SECTIONS.reduce((n,s)=>n+s.data.filter(d=>d.status==='Stub').length,0);
  let html=`<div class="home-ttl">D365FO Figma Catalog</div><div class="home-sub">${total} items · <span style="color:#16A34A;font-weight:600">${seeded} seeded</span> · <span style="color:#D97706;font-weight:600">${stub} stub</span> · <span style="color:#94A3B8;font-weight:600">${total-seeded-stub} todo</span></div>`;
  SECTIONS.forEach(s=>{
    html+=`<div class="home-sec-lbl">${s.label}</div><div class="home-grid">${s.data.map(item=>`<div class="hcard" data-id="${item.id}" data-sec="${s.key}"><div class="hcard-name">${item.name}<span class="badge ${(item.status||'todo').toLowerCase()}" style="font-size:10px;padding:1px 6px">${item.status}</span></div><div class="hcard-figma">${item.figma||'—'}</div><div class="hcard-purpose">${item.purpose||'Doc pending.'}</div></div>`).join('')}</div>`;
  });
  main.innerHTML=html;
  main.querySelectorAll('.hcard').forEach(c=>c.addEventListener('click',()=>navigate(c.dataset.id,c.dataset.sec)));
}

document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();
  buildNav(q||undefined);
  if(!q&&!currentId)showHome();
});

showHome();
</script>
